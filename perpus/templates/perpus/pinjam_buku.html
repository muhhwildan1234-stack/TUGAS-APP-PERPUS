<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIPUSTAKA - Pinjam Buku</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F4F7FE] min-h-screen flex text-[#2B3674]">

    <aside class="w-64 bg-[#0B1437] text-white flex flex-col justify-between p-6 shrink-0">
        <div>
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-[#115EFF] rounded-full flex items-center justify-center font-bold text-lg text-white">
                    P
                </div>
                <div>
                    <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold">SIPUSTAKA</p>
                    <h1 class="text-sm font-bold leading-tight">Sistem Peminjaman<br>Buku</h1>
                </div>
            </div>

            <nav class="space-y-2">
                <a href="{% url 'dashboard' %}" class="flex items-center gap-4 px-4 py-3 text-gray-400 hover:text-white font-medium text-sm rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 012 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"/></svg>
                    Dashboard
                </a>
                <a href="{% url 'daftar_buku' %}" class="flex items-center gap-4 px-4 py-3 text-gray-400 hover:text-white font-medium text-sm rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
                    Buku
                </a>
                <a href="{% url 'peminjaman' %}" class="flex items-center gap-4 px-4 py-3 bg-[#1B254B] text-white font-semibold text-sm rounded-xl transition border-r-4 border-[#115EFF]">
                    <svg class="w-5 h-5 text-[#115EFF]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    Peminjaman
                </a>
                <a href="{% url 'daftar_user' %}" class="flex items-center gap-4 px-4 py-3 text-gray-400 hover:text-white font-medium text-sm rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                    User
                </a>
            </nav>
        </div>

        <div class="bg-[#111C44] p-4 rounded-xl">
            <p class="text-[11px] text-gray-400 font-medium mb-1">Admin Aktif</p>
            <p class="text-sm font-bold text-white">Budi Siregar</p>
        </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="flex items-center gap-3 mb-6">
            <a href="{% url 'peminjaman' %}" class="text-gray-400 hover:text-[#1B254B] transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </a>
            <div>
                <p class="text-xs text-gray-400 font-medium">Peminjaman Buku</p>
                <h2 class="text-2xl font-bold text-[#1B254B]">Pinjam Buku</h2>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-8 shadow-sm max-w-4xl">
            <form method="POST" action="{% url 'pinjam_buku' %}" class="space-y-6">
                {% csrf_token %}
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-[#2B3674] mb-2">Nama Peminjam</label>
                        <select name="anggota" required class="w-full bg-[#F4F7FE] border-2 border-transparent focus:border-[#115EFF] focus:bg-white rounded-2xl p-4 text-sm font-medium text-[#2B3674] outline-none transition appearance-none">
                            <option value="" disabled selected>Pilih Anggota/User...</option>
                            {% for user in users_all %}
                                <option value="{{ user.id }}">{{ user.nama }} ({{ user.nis }})</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-[#2B3674] mb-2">Buku</label>
                        <select name="buku" required class="w-full bg-[#F4F7FE] border-2 border-transparent focus:border-[#115EFF] focus:bg-white rounded-2xl p-4 text-sm font-medium text-[#2B3674] outline-none transition appearance-none">
                            <option value="" disabled selected>Pilih Buku...</option>
                            {% for buku in buku_all %}
                                <option value="{{ buku.id }}" {% if buku.stok < 1 %}disabled class="text-gray-400"{% endif %}>
                                    {{ buku.judul }} {% if buku.stok < 1 %}(Stok Habis){% else %}(Stok: {{ buku.stok }}){% endif %}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-[#2B3674] mb-2">Tanggal Pinjam</label>
                        <input type="date" name="tanggal_pinjam" required class="w-full bg-[#F4F7FE] border-2 border-transparent focus:border-[#115EFF] focus:bg-white rounded-2xl p-4 text-sm font-medium text-[#2B3674] outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-[#2B3674] mb-2">Jatuh Tempo</label>
                        <input type="date" name="jatuh_tempo" required class="w-full bg-[#F4F7FE] border-2 border-transparent focus:border-[#115EFF] focus:bg-white rounded-2xl p-4 text-sm font-medium text-[#2B3674] outline-none transition">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-bold text-[#2B3674] mb-2">Keperluan Utama</label>
                        <input type="text" name="keperluan" placeholder="Contoh: Tugas sekolah, Bacaan pribadi" required class="w-full bg-[#F4F7FE] border-2 border-transparent focus:border-[#115EFF] focus:bg-white rounded-2xl p-4 text-sm font-medium text-[#2B3674] outline-none transition">
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-[#2B3674] mb-2">Petugas Penanggung Jawab</label>
                        <input type="text" name="petugas" value="Budi Siregar" readonly class="w-full bg-[#F4F7FE] text-gray-500 rounded-2xl p-4 text-sm font-medium border-2 border-transparent outline-none cursor-not-allowed">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-[#2B3674] mb-2">Keterangan Tambahan Keperluan</label>
                    <textarea name="keterangan_keperluan" rows="3" placeholder="Tulis rincian penugasan atau referensi di sini..." class="w-full bg-[#F4F7FE] border-2 border-transparent focus:border-[#115EFF] focus:bg-white rounded-2xl p-4 text-sm font-medium text-[#2B3674] outline-none transition resize-none"></textarea>
                </div>

                <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
                    <a href="{% url 'peminjaman' %}" class="bg-[#F4F7FE] hover:bg-gray-200 text-[#2B3674] font-bold text-sm px-6 py-3.5 rounded-2xl transition">
                        Batal
                    </a>
                    <button type="submit" class="bg-[#115EFF] hover:bg-blue-700 text-white font-bold text-sm px-6 py-3.5 rounded-2xl shadow-md transition">
                        Simpan Transaksi
                    </button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
