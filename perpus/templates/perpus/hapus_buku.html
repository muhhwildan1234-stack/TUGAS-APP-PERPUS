<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Hapus Buku</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f7fc] p-8">
    <div class="bg-white max-w-md mx-auto rounded-2xl p-6 border border-gray-100 shadow-sm text-center">
        <div class="text-rose-500 mb-4"><i class="fa-solid fa-triangle-exclamation text-4xl"></i></div>
        <h2 class="text-lg font-bold text-gray-800">Konfirmasi Hapus Buku</h2>
        <p class="text-sm text-gray-500 mt-2">Apakah kamu yakin ingin menghapus buku <strong class="text-gray-700">"{{ buku.judul }}"</strong> secara permanen?</p>
        <form method="POST" class="mt-6 flex justify-center space-x-3">
            {% csrf_token %}
            <button type="submit" class="bg-rose-600 text-white px-5 py-2 rounded-xl text-sm font-semibold">Ya, Hapus</button>
            <a href="{% url 'daftar_buku' %}" class="bg-gray-100 text-gray-600 px-5 py-2 rounded-xl text-sm font-semibold">Batal</a>
        </form>
    </div>
</body>
</html>
