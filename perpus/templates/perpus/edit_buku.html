<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% if aksi %}{{ aksi }}{% else %}Edit{% endif %} Buku</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f4f7fc] p-8">
    <div class="bg-white max-w-xl mx-auto rounded-2xl p-6 border border-gray-100 shadow-sm">
        <h2 class="text-xl font-bold text-gray-800 mb-4">Form {{ aksi|default:"Perubahan" }} Data Buku</h2>
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Judul Buku</label>
                <input type="text" name="judul" value="{{ buku.judul|default:'' }}" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Penulis</label>
                <input type="text" name="penulis" value="{{ buku.pengarang|default:'' }}" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Penerbit</label>
                    <input type="text" name="penerbit" value="{{ buku.penerbit|default:'' }}" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 mb-1">Tahun Terbit</label>
                    <input type="number" name="tahun_terbit" value="{{ buku.tahun_terbit|default:'' }}" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Kategori</label>
                <input type="text" name="kategori" value="{{ buku.kategori|default:'' }}" placeholder="Contoh: Novel, Sains, Sejarah" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-500 mb-1">Stok</label>
                <input type="number" name="stok" value="{{ buku.stok|default:'0' }}" required class="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-sm">
            </div>
            <div class="flex space-x-2 pt-2">
                <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-semibold">Simpan Data</button>
                <a href="{% url 'daftar_buku' %}" class="bg-gray-100 text-gray-600 px-4 py-2 rounded-xl text-sm font-semibold">Batal</a>
            </div>
        </form>
    </div>
</body>
</html>
